<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HLS Player - Kapamilya Stream (CORS Fixed)</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-container {
            max-width: 1280px;
            width: 100%;
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
        }
        .video-wrapper {
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-js {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
        }
        .video-js .vjs-big-play-button {
            background-color: rgba(220, 20, 60, 0.8);
            border-radius: 50%;
            width: 3em;
            height: 3em;
            line-height: 3em;
            margin-top: -1.5em;
            margin-left: -1.5em;
            border: none;
        }
        .video-js .vjs-big-play-button:hover {
            background-color: #crimson;
        }
        .controls-info {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            color: #e0e0e0;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
        .status {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ff4d4d;
            box-shadow: 0 0 6px #ff4d4d;
            transition: all 0.2s;
        }
        .led.active {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }
        button {
            background: rgba(30,30,40,0.9);
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: #dc143c;
            transform: scale(1.02);
        }
        .quality-badge {
            background: #1e2a3a;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 12px;
        }
        .footer-note {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #aaa;
        }
        .proxy-warning {
            background: rgba(255, 100, 0, 0.2);
            border-left: 3px solid #ff6600;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 11px;
            text-align: center;
        }
        @media (max-width: 640px) {
            .controls-info {
                border-radius: 28px;
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .status {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="player-container">
    <div class="video-wrapper">
        <video
            id="hlsPlayer"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            preload="auto"
            data-setup='{}'
            poster="https://via.placeholder.com/1280x720/0a1a2f/ffffff?text=Kapamilya+Stream"
        >
            <p class="vjs-no-js">
                To view this video please enable JavaScript, and consider upgrading to a
                web browser that supports HTML5 video.
            </p>
        </video>
    </div>
    <div class="controls-info">
        <div class="status">
            <span class="led" id="streamLed"></span>
            <span id="streamStatusText">Naghihintay ng stream...</span>
        </div>
        <div class="quality-badge" id="qualityInfo">HLS • Adaptive</div>
        <button id="reloadBtn">🔄 I-reload ang stream</button>
    </div>
    <div class="proxy-warning" id="proxyNote">
        ⚡ Gumagamit ng CORS proxy para sa stream. Kung hindi gumana, subukan ang alternative proxy sa ibaba.
    </div>
    <div class="footer-note">
        📡 M3U8 HLS Player | Kapamilya Channel
    </div>
</div>

<!-- Video.js core + HLS support -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>

<script>
    // Original M3U8 URL with token
    const ORIGINAL_URL = "https://converse.nathcreqtives.com/cignal/kapamilya/playlist.m3u8?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJtb29uIiwiaWF0IjoxNzczODk2NjUxLCJleHAiOjE3NzQ3OTIzNTUsImFjY291bnRFeHBpcmVkIjpmYWxzZSwiYWNjb3VudEV4cGlyZXNBdCI6MTc3NDc5MjM1NSwiYWxsb3dlZE9yaWdpbnMiOlsiaHR0cHM6Ly8zcnNuZXcucGFnZXMuZGV2IiwiaHR0cHM6Ly8zcnNyYWRpbzIucGFnZXMuZGV2Il19.vP0CY269yvtEkjOU5rVmfiTUSIqB9xEMZhfyhORNLj8";
    
    // CORS Proxies (try multiple if one fails)
    const CORS_PROXIES = [
        'https://cors-anywhere.herokuapp.com/',
        'https://api.allorigins.win/raw?url=',
        'https://proxy.cors.sh/',
        'https://cors-proxy.htmldriven.com/?url='
    ];
    
    let currentProxyIndex = 0;
    let player;
    let retryAttempt = 0;
    const MAX_RETRIES = 3;
    let currentProxyUrl = null;
    
    // Function to get URL with proxy
    function getProxiedUrl(originalUrl, proxyUrl) {
        // For allorigins, we need special handling because it returns JSON
        if (proxyUrl.includes('allorigins')) {
            return proxyUrl + encodeURIComponent(originalUrl);
        }
        // For cors.sh and others
        return proxyUrl + encodeURIComponent(originalUrl);
    }
    
    // Update status display
    function updateStatus(isPlaying, errorMsg = null) {
        const led = document.getElementById('streamLed');
        const statusText = document.getElementById('streamStatusText');
        if (errorMsg) {
            led.className = 'led';
            statusText.innerHTML = `⚠️ ${errorMsg}`;
            return;
        }
        if (isPlaying) {
            led.className = 'led active';
            statusText.innerHTML = '📺 Nagpe-play na ang stream (Live / HLS)';
        } else {
            led.className = 'led';
            statusText.innerHTML = '⏸ Naka-pause o naglo-load...';
        }
    }
    
    // Try next proxy if current fails
    function tryNextProxy() {
        if (currentProxyIndex < CORS_PROXIES.length - 1) {
            currentProxyIndex++;
            const proxyNote = document.getElementById('proxyNote');
            proxyNote.innerHTML = `🔄 Sinusubukan ang alternative proxy (${currentProxyIndex + 1}/${CORS_PROXIES.length})...`;
            loadStream();
        } else {
            updateStatus(false, 'Lahat ng proxy ay nabigo. Maaaring expired ang token o offline ang stream.');
            document.getElementById('proxyNote').innerHTML = '❌ Hindi makakonekta sa stream. Pindutin ang reload para subukan muli.';
        }
    }
    
    // Load stream with current proxy
    function loadStream() {
        if (!player) return;
        
        const proxyUrl = CORS_PROXIES[currentProxyIndex];
        const proxiedUrl = getProxiedUrl(ORIGINAL_URL, proxyUrl);
        currentProxyUrl = proxiedUrl;
        
        console.log(`Using proxy ${currentProxyIndex + 1}: ${proxyUrl}`);
        updateStatus(false, `Kumokonekta sa stream (proxy ${currentProxyIndex + 1}/${CORS_PROXIES.length})...`);
        document.getElementById('qualityInfo').innerHTML = '⏳ Naglo-load...';
        
        // Set source with proxy URL
        player.src({ type: 'application/x-mpegURL', src: proxiedUrl });
        player.load();
        
        // Autoplay attempt
        player.play().catch(e => {
            console.warn('Autoplay prevented:', e);
            updateStatus(false, 'I-tap ang play para magsimula');
        });
    }
    
    // Initialize HLS player
    function initHLSPlayer() {
        if (!player) {
            player = videojs('hlsPlayer', {
                controls: true,
                autoplay: true,
                preload: 'auto',
                html5: {
                    hls: {
                        enableLowInitialPlaylist: true,
                        smoothQualityChange: true,
                        overrideNative: true,
                        debug: false
                    }
                },
                playbackRates: [0.5, 1, 1.5, 2],
                controlBar: {
                    children: [
                        'playToggle',
                        'volumePanel',
                        'currentTimeDisplay',
                        'timeDivider',
                        'durationDisplay',
                        'progressControl',
                        'liveDisplay',
                        'playbackRateMenuButton',
                        'fullscreenToggle'
                    ]
                }
            });
            
            player.ready(() => {
                console.log('✅ Video.js player ready');
                loadStream();
            });
            
            // Event listeners
            player.on('playing', () => {
                updateStatus(true);
                retryAttempt = 0;
                document.getElementById('qualityInfo').innerHTML = '🎬 HLS • Streaming via proxy';
                document.getElementById('proxyNote').style.background = 'rgba(46, 204, 113, 0.2)';
                document.getElementById('proxyNote').style.borderLeftColor = '#2ecc71';
            });
            
            player.on('pause', () => updateStatus(false));
            player.on('waiting', () => updateStatus(false, 'Buffering...'));
            
            player.on('error', (event) => {
                console.error('Player error:', event);
                let errorMsg = 'Stream error.';
                const mediaError = player.error();
                if (mediaError) {
                    errorMsg = `Error: ${mediaError.code}`;
                    console.log('Media error details:', mediaError);
                }
                updateStatus(false, errorMsg);
                
                // Try next proxy if current failed
                if (retryAttempt < MAX_RETRIES) {
                    retryAttempt++;
                    console.log(`Retrying with next proxy... attempt ${retryAttempt}`);
                    setTimeout(() => {
                        tryNextProxy();
                    }, 2000);
                } else {
                    updateStatus(false, 'Hindi makakonekta. Subukan ang manual reload.');
                }
            });
            
            player.on('loadedmetadata', () => {
                updateStatus(true);
                try {
                    if (player.hls && player.hls.levels && player.hls.levels.length) {
                        document.getElementById('qualityInfo').innerHTML = `🎛️ HLS • ${player.hls.levels.length} variants`;
                    }
                } catch(e) { console.warn(e); }
            });
        } else {
            loadStream();
        }
    }
    
    // Manual reload function
    function reloadStream() {
        retryAttempt = 0;
        currentProxyIndex = 0;
        if (player) {
            loadStream();
        } else {
            initHLSPlayer();
        }
    }
    
    // Alternative: Direct iframe method for testing (if CORS is too strict)
    function showAlternativeMethod() {
        console.log("If proxy fails, try opening the M3U8 in VLC or using a browser extension to disable CORS");
    }
    
    // Add button listener
    document.getElementById('reloadBtn').addEventListener('click', () => {
        reloadStream();
    });
    
    // Start everything
    document.addEventListener('DOMContentLoaded', () => {
        initHLSPlayer();
    });
</script>
</body>
</html>
