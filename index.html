<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HLS Player - Kapamilya Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-container {
            max-width: 1280px;
            width: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .video-wrapper {
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: block;
            background: #000;
        }
        .controls-bar {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #e0e0e0;
        }
        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 6px #ff4444;
            transition: all 0.2s;
        }
        .led.playing {
            background: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }
        .led.buffering {
            background: #f39c12;
            box-shadow: 0 0 8px #f39c12;
        }
        button {
            background: rgba(220, 20, 60, 0.9);
            border: none;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: 0.2s;
        }
        button:hover {
            background: #dc143c;
            transform: scale(1.02);
        }
        .quality-select {
            background: #1e2a3a;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
        }
        .info-text {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #aaa;
        }
        @media (max-width: 640px) {
            .controls-bar {
                border-radius: 28px;
                flex-direction: column;
                align-items: stretch;
            }
            .status-indicator {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="player-container">
    <div class="video-wrapper">
        <video id="video" controls playsinline></video>
    </div>
    <div class="controls-bar">
        <div class="status-indicator">
            <span class="led" id="led"></span>
            <span id="statusText">Ready</span>
        </div>
        <select id="qualitySelect" class="quality-select" style="display: none;">
            <option value="auto">Auto Quality</option>
        </select>
        <button id="reloadBtn">🔄 Reload Stream</button>
    </div>
    <div class="info-text">
        🎬 HLS.js Player | Kapamilya Channel • Same engine used by m3u8-player.net
    </div>
</div>

<!-- hls.js - the same library used by m3u8-player.net -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
    // Your M3U8 URL
    const M3U8_URL = "https://converse.nathcreqtives.com/cignal/kapamilya/playlist.m3u8?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJtb29uIiwiaWF0IjoxNzczODk2NjUxLCJleHAiOjE3NzQ3OTIzNTUsImFjY291bnRFeHBpcmVkIjpmYWxzZSwiYWNjb3VudEV4cGlyZXNBdCI6MTc3NDc5MjM1NSwiYWxsb3dlZE9yaWdpbnMiOlsiaHR0cHM6Ly8zcnNuZXcucGFnZXMuZGV2IiwiaHR0cHM6Ly8zcnNyYWRpbzIucGFnZXMuZGV2Il19.vP0CY269yvtEkjOU5rVmfiTUSIqB9xEMZhfyhORNLj8";
    
    const video = document.getElementById('video');
    const led = document.getElementById('led');
    const statusText = document.getElementById('statusText');
    const qualitySelect = document.getElementById('qualitySelect');
    const reloadBtn = document.getElementById('reloadBtn');
    
    let hls = null;
    let currentLevels = [];
    
    function updateStatus(state, message) {
        led.className = 'led';
        if (state === 'playing') {
            led.classList.add('playing');
        } else if (state === 'buffering') {
            led.classList.add('buffering');
        }
        statusText.textContent = message;
    }
    
    function initPlayer() {
        // Clear previous HLS instance if exists
        if (hls) {
            hls.destroy();
            hls = null;
        }
        
        // Check if browser supports native HLS (Safari)
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            updateStatus('buffering', 'Loading stream (native HLS)...');
            video.src = M3U8_URL;
            video.addEventListener('loadedmetadata', () => {
                updateStatus('playing', 'Playing • Native HLS');
            });
            video.addEventListener('playing', () => updateStatus('playing', 'Playing • Native HLS'));
            video.addEventListener('waiting', () => updateStatus('buffering', 'Buffering...'));
            video.addEventListener('error', () => {
                updateStatus('buffering', 'Native HLS failed, trying hls.js...');
                loadWithHlsJs();
            });
            video.play().catch(e => {
                console.warn('Autoplay blocked:', e);
                updateStatus('buffering', 'Click play to start');
            });
        } else {
            // Use hls.js for all other browsers
            loadWithHlsJs();
        }
    }
    
    function loadWithHlsJs() {
        if (!Hls.isSupported()) {
            updateStatus('buffering', 'HLS not supported in this browser');
            statusText.textContent = '❌ HLS not supported';
            return;
        }
        
        updateStatus('buffering', 'Loading stream with hls.js...');
        
        hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 90,
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            liveSyncDurationCount: 3,
            liveMaxLatencyDurationCount: 6,
            startLevel: -1, // auto quality
            debug: false
        });
        
        // Load the M3U8 source
        hls.loadSource(M3U8_URL);
        hls.attachMedia(video);
        
        // Quality levels available
        hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
            currentLevels = data.levels;
            if (currentLevels.length > 1) {
                qualitySelect.style.display = 'inline-block';
                qualitySelect.innerHTML = '<option value="auto">Auto Quality</option>';
                currentLevels.forEach((level, idx) => {
                    const height = level.height || (level.width ? Math.round(level.width * 9 / 16) : 'unknown');
                    const bitrate = (level.bitrate / 1000).toFixed(0);
                    qualitySelect.innerHTML += `<option value="${idx}">${height}p (${bitrate} kbps)</option>`;
                });
            }
            updateStatus('playing', `Playing • ${currentLevels.length} quality levels`);
            video.play().catch(e => console.log('Autoplay prevented:', e));
        });
        
        // Level switch event
        hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
            const level = data.level;
            if (level >= 0 && currentLevels[level]) {
                const height = currentLevels[level].height || 'auto';
                updateStatus('playing', `Playing • ${height}p`);
            } else {
                updateStatus('playing', 'Playing • Auto quality');
            }
        });
        
        // Loading events
        hls.on(Hls.Events.BUFFER_APPENDING, () => {
            if (video.paused === false) {
                updateStatus('playing', 'Playing • Buffering');
            }
        });
        
        hls.on(Hls.Events.BUFFER_APPENDED, () => {
            if (video.paused === false) {
                updateStatus('playing', 'Playing');
            }
        });
        
        // Error handling with retry
        hls.on(Hls.Events.ERROR, (event, data) => {
            console.error('HLS Error:', data);
            
            if (data.fatal) {
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        updateStatus('buffering', 'Network error, retrying...');
                        setTimeout(() => {
                            hls.startLoad();
                        }, 2000);
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        updateStatus('buffering', 'Media error, recovering...');
                        hls.recoverMediaError();
                        break;
                    default:
                        updateStatus('buffering', 'Fatal error, reloading...');
                        setTimeout(() => {
                            initPlayer();
                        }, 3000);
                        break;
                }
            } else {
                updateStatus('buffering', `Warning: ${data.details}`);
            }
        });
        
        video.addEventListener('playing', () => updateStatus('playing', 'Playing'));
        video.addEventListener('pause', () => updateStatus('buffering', 'Paused'));
        video.addEventListener('waiting', () => updateStatus('buffering', 'Buffering...'));
        video.addEventListener('error', (e) => {
            console.error('Video error:', e);
            updateStatus('buffering', 'Video error, reloading...');
            setTimeout(() => initPlayer(), 2000);
        });
    }
    
    // Quality selector
    qualitySelect.addEventListener('change', (e) => {
        if (hls) {
            const level = parseInt(e.target.value);
            if (isNaN(level)) {
                hls.currentLevel = -1;
                updateStatus('buffering', 'Switching to Auto quality...');
            } else {
                hls.currentLevel = level;
                const height = currentLevels[level]?.height || 'selected';
                updateStatus('buffering', `Switching to ${height}p...`);
            }
        }
    });
    
    // Reload button
    reloadBtn.addEventListener('click', () => {
        updateStatus('buffering', 'Reloading stream...');
        initPlayer();
    });
    
    // Start player
    initPlayer();
</script>
</body>
</html>
