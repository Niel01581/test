<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IPTV Player - MPD Stream</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.0/dist/shaka-player.compiled.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        
        .player-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        video {
            width: 100%;
            height: auto;
            background: #000;
        }
        
        .controls-panel {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin-top: 20px;
            border-radius: 12px;
        }
        
        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .url-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a3a;
            border: 1px solid #3a3a4a;
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }
        
        .url-input:focus {
            outline: none;
            border-color: #00adb5;
        }
        
        button {
            padding: 12px 24px;
            background: #00adb5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #00838f;
            transform: translateY(-1px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button.danger {
            background: #dc3545;
        }
        
        button.danger:hover {
            background: #c82333;
        }
        
        button.success {
            background: #28a745;
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status.loading {
            background: #ffc10720;
            color: #ffc107;
            border-left: 4px solid #ffc107;
        }
        
        .status.success {
            background: #28a74520;
            color: #28a745;
            border-left: 4px solid #28a745;
        }
        
        .status.error {
            background: #dc354520;
            color: #dc3545;
            border-left: 4px solid #dc3545;
        }
        
        .channel-list {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .channel-list h3 {
            color: white;
            margin-bottom: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .channel-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .channel-btn {
            background: #2a2a3a;
            padding: 8px 16px;
            font-size: 12px;
        }
        
        .channel-btn:hover {
            background: #00adb5;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .url-input-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-wrapper">
            <video id="video" class="video-js vjs-big-play-centered" controls preload="auto">
                <p class="vjs-no-js">Please enable JavaScript</p>
            </video>
        </div>
        
        <div class="controls-panel">
            <div class="url-input-group">
                <input type="text" id="mpdUrl" class="url-input" placeholder="Enter MPD / M3U8 URL..." value="http://136.158.97.2:6610/001/2/ch00000090990000001093/manifest.mpd?AuthInfo=v87HD9rEhwHiAdYyrP20TsXah2%2FZLFNNIdWrVrXDMAoLvT86fM74ocVChyFS93HUsyK4TH4mOENKJ45mwOyS0g%3D%3D&version=v1.0&BreakPoint=0&virtualDomain=001.live_hls.zte.com&programid=ch00000000000000001214&contentid=ch00000000000000001214&videoid=ch00000090990000001093&recommendtype=0&userid=1438418816418&boid=001&stbid=02%3A00%3A00%3A00%3A00%3A00&terminalflag=1&profilecode=&usersessionid=BLJMICF8T5XXXX&NeedJITP=1&JITPMediaType=DASH&JITPDRMType=NO">
                <button onclick="loadStream()" id="playBtn">▶ PLAY</button>
                <button onclick="stopStream()" class="danger">⏹ STOP</button>
            </div>
            
            <div id="status" class="status loading">
                <div class="spinner"></div>
                <span>Ready to play. Click PLAY to start...</span>
            </div>
        </div>
        
        <div class="channel-list">
            <h3>📺 SAVED CHANNELS (Click to load)</h3>
            <div class="channel-buttons">
                <button class="channel-btn" onclick="loadSavedChannel(0)">Channel 1 (MPD)</button>
            </div>
        </div>
    </div>

    <script>
        let player = null;
        let currentPlayerType = null;
        
        // Your MPD URL
        const DEFAULT_MPD = document.getElementById('mpdUrl').value;
        
        // Initialize video.js player as fallback
        function initVideoJS() {
            if (player) {
                player.dispose();
            }
            player = videojs('video', {
                controls: true,
                autoplay: true,
                preload: 'auto',
                techOrder: ['html5'],
                html5: {
                    nativeControlsForTouch: true,
                    nativeAudioTracks: false,
                    nativeVideoTracks: false,
                    hls: {
                        overrideNative: true
                    }
                }
            });
            currentPlayerType = 'videojs';
            return player;
        }
        
        // Initialize Shaka Player for MPD/DASH
        function initShakaPlayer() {
            if (player && currentPlayerType === 'videojs') {
                player.dispose();
            }
            
            const videoElement = document.getElementById('video');
            // Remove videojs wrapper if exists
            if (videoElement.hasAttribute('data-vjs-player')) {
                videoElement.removeAttribute('data-vjs-player');
            }
            
            // Reset video element
            videoElement.pause();
            videoElement.src = '';
            videoElement.load();
            
            player = new shaka.Player(videoElement);
            currentPlayerType = 'shaka';
            return player;
        }
        
        // Update status display
        function updateStatus(type, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            
            if (type === 'loading') {
                statusDiv.innerHTML = `<div class="spinner"></div><span>${message}</span>`;
            } else if (type === 'success') {
                statusDiv.innerHTML = `<span>✅ ${message}</span>`;
            } else if (type === 'error') {
                statusDiv.innerHTML = `<span>❌ ${message}</span>`;
            }
        }
        
        // Check if URL is MPD or HLS
        function getStreamType(url) {
            if (url.includes('.mpd') || url.includes('manifest.mpd') || url.includes('DASH')) {
                return 'dash';
            }
            if (url.includes('.m3u8') || url.includes('hls')) {
                return 'hls';
            }
            return 'auto';
        }
        
        // Load stream with CORS proxy (para iwas mixed content)
        function getProxiedUrl(originalUrl) {
            // Kung HTTPS na yung site mo, kailangan ng proxy para sa HTTP na stream
            if (window.location.protocol === 'https:' && originalUrl.startsWith('http://')) {
                // Gumamit ng public CORS proxy
                const proxy = 'https://corsproxy.io/?' + encodeURIComponent(originalUrl);
                console.log('Using proxy:', proxy);
                return proxy;
            }
            return originalUrl;
        }
        
        // Main load function
        async function loadStream() {
            let url = document.getElementById('mpdUrl').value.trim();
            
            if (!url) {
                updateStatus('error', 'Please enter a stream URL');
                return;
            }
            
            const streamType = getStreamType(url);
            updateStatus('loading', `Loading stream... (${streamType.toUpperCase()})`);
            
            try {
                if (streamType === 'dash' || (streamType === 'auto' && url.includes('.mpd'))) {
                    // Use Shaka Player for DASH/MPD
                    const shakaPlayer = initShakaPlayer();
                    
                    // Configure Shaka
                    shakaPlayer.configure({
                        abr: { enabled: true },
                        streaming: {
                            bufferingGoal: 10,
                            rebufferingGoal: 2,
                            retryParameters: {
                                maxAttempts: 5,
                                baseDelay: 1000,
                                backoffFactor: 2
                            }
                        }
                    });
                    
                    // Add error handling
                    shakaPlayer.addEventListener('error', (event) => {
                        console.error('Shaka error:', event.detail);
                        updateStatus('error', `Playback error: ${event.detail.message || 'Unknown error'}`);
                    });
                    
                    // Load the manifest
                    const proxiedUrl = getProxiedUrl(url);
                    await shakaPlayer.load(proxiedUrl);
                    
                    updateStatus('success', 'Stream loaded successfully! Playing...');
                    
                    // Auto play
                    const videoElement = document.getElementById('video');
                    videoElement.play().catch(e => {
                        console.log('Auto-play blocked:', e);
                        updateStatus('success', 'Stream ready. Click play to start.');
                    });
                    
                } else if (streamType === 'hls') {
                    // Use Video.js for HLS
                    const videojsPlayer = initVideoJS();
                    
                    videojsPlayer.src({
                        src: getProxiedUrl(url),
                        type: 'application/x-mpegURL'
                    });
                    
                    videojsPlayer.ready(() => {
                        videojsPlayer.play();
                        updateStatus('success', 'HLS Stream loaded successfully!');
                    });
                    
                    videojsPlayer.on('error', () => {
                        updateStatus('error', 'Failed to load HLS stream');
                    });
                    
                } else {
                    // Try Video.js for other formats
                    const videojsPlayer = initVideoJS();
                    videojsPlayer.src(url);
                    videojsPlayer.ready(() => {
                        videojsPlayer.play();
                        updateStatus('success', 'Stream loaded!');
                    });
                }
                
            } catch (error) {
                console.error('Load error:', error);
                updateStatus('error', `Failed to load: ${error.message || 'Unknown error'}`);
                
                // Fallback: try using native video element
                try {
                    updateStatus('loading', 'Trying fallback method...');
                    const videoElement = document.getElementById('video');
                    videoElement.src = getProxiedUrl(url);
                    videoElement.load();
                    videoElement.play();
                    updateStatus('success', 'Playing with fallback player');
                } catch (fallbackError) {
                    updateStatus('error', 'All playback methods failed. Check URL or network.');
                }
            }
        }
        
        // Stop stream
        function stopStream() {
            if (player) {
                if (currentPlayerType === 'shaka') {
                    player.destroy();
                } else if (currentPlayerType === 'videojs') {
                    player.pause();
                    player.src({ type: 'video/mp4', src: '' });
                }
            }
            
            const videoElement = document.getElementById('video');
            videoElement.pause();
            videoElement.src = '';
            videoElement.load();
            
            updateStatus('loading', 'Stopped. Ready to play.');
        }
        
        // Load saved channel
        function loadSavedChannel(index) {
            const channels = [DEFAULT_MPD];
            if (channels[index]) {
                document.getElementById('mpdUrl').value = channels[index];
                loadStream();
            }
        }
        
        // Handle enter key
        document.getElementById('mpdUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadStream();
            }
        });
        
        // Auto-load on page load (optional - comment out if ayaw)
        // setTimeout(() => loadStream(), 1000);
    </script>
</body>
</html>
