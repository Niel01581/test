<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HLS Player - Kapamilya Stream</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-container {
            max-width: 1280px;
            width: 100%;
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
        }
        .video-wrapper {
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-js {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
        }
        .video-js .vjs-big-play-button {
            background-color: rgba(220, 20, 60, 0.8);
            border-radius: 50%;
            width: 3em;
            height: 3em;
            line-height: 3em;
            margin-top: -1.5em;
            margin-left: -1.5em;
            border: none;
        }
        .video-js .vjs-big-play-button:hover {
            background-color: #crimson;
        }
        .controls-info {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            color: #e0e0e0;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
        .status {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ff4d4d;
            box-shadow: 0 0 6px #ff4d4d;
            transition: all 0.2s;
        }
        .led.active {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }
        button {
            background: rgba(30,30,40,0.9);
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: #dc143c;
            transform: scale(1.02);
        }
        .quality-badge {
            background: #1e2a3a;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 12px;
        }
        .footer-note {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #aaa;
        }
        @media (max-width: 640px) {
            .controls-info {
                border-radius: 28px;
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .status {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="player-container">
    <div class="video-wrapper">
        <video
            id="hlsPlayer"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            preload="auto"
            data-setup='{}'
            poster="https://via.placeholder.com/1280x720/0a1a2f/ffffff?text=Kapamilya+Stream"
        >
            <p class="vjs-no-js">
                To view this video please enable JavaScript, and consider upgrading to a
                web browser that supports HTML5 video.
            </p>
        </video>
    </div>
    <div class="controls-info">
        <div class="status">
            <span class="led" id="streamLed"></span>
            <span id="streamStatusText">Naghihintay ng stream...</span>
        </div>
        <div class="quality-badge" id="qualityInfo">HLS • Adaptive</div>
        <button id="reloadBtn">🔄 I-reload ang stream</button>
    </div>
    <div class="footer-note">
        📡 M3U8 HLS Player | Kapamilya Channel • Ipinapakita ang adaptive streaming
    </div>
</div>

<!-- Video.js core + HLS support -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>

<script>
    // M3U8 URL na ibinigay (kasama ang token)
    const M3U8_URL = "https://converse.nathcreqtives.com/cignal/kapamilya/playlist.m3u8?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJtb29uIiwiaWF0IjoxNzczODk2NjUxLCJleHAiOjE3NzQ3OTIzNTUsImFjY291bnRFeHBpcmVkIjpmYWxzZSwiYWNjb3VudEV4cGlyZXNBdCI6MTc3NDc5MjM1NSwiYWxsb3dlZE9yaWdpbnMiOlsiaHR0cHM6Ly8zcnNuZXcucGFnZXMuZGV2IiwiaHR0cHM6Ly8zcnNyYWRpbzIucGFnZXMuZGV2Il19.vP0CY269yvtEkjOU5rVmfiTUSIqB9xEMZhfyhORNLj8";
    
    let player;
    let currentQualityLevels = [];
    let retryAttempt = 0;
    const MAX_RETRIES = 3;

    // Helper: update LED and status text
    function updateStatus(isPlaying, errorMsg = null) {
        const led = document.getElementById('streamLed');
        const statusText = document.getElementById('streamStatusText');
        if (errorMsg) {
            led.className = 'led';
            statusText.innerHTML = `⚠️ ${errorMsg}`;
            return;
        }
        if (isPlaying) {
            led.className = 'led active';
            statusText.innerHTML = '📺 Nagpe-play na ang stream (Live / HLS)';
        } else {
            led.className = 'led';
            statusText.innerHTML = '⏸ Naka-pause o naglo-load...';
        }
    }

    // Function to initialize or reload HLS source
    function initHLSPlayer() {
        if (!player) {
            // Create player instance
            player = videojs('hlsPlayer', {
                controls: true,
                autoplay: true,
                preload: 'auto',
                html5: {
                    hls: {
                        enableLowInitialPlaylist: true,
                        smoothQualityChange: true,
                        overrideNative: true,  // force use of videojs-contrib-hls for better compatibility
                        debug: false
                    }
                },
                playbackRates: [0.5, 1, 1.5, 2],
                controlBar: {
                    children: [
                        'playToggle',
                        'volumePanel',
                        'currentTimeDisplay',
                        'timeDivider',
                        'durationDisplay',
                        'progressControl',
                        'liveDisplay',
                        'qualitySelector',   // if available, but we handle quality info manually
                        'playbackRateMenuButton',
                        'fullscreenToggle'
                    ]
                }
            });

            // When player is ready, set source
            player.ready(() => {
                console.log('✅ Video.js player ready');
                loadStream();
            });

            // Event listeners for status
            player.on('playing', () => {
                updateStatus(true);
                retryAttempt = 0; // reset retry counter on successful play
                document.getElementById('qualityInfo').innerHTML = '🎬 HLS • Adaptive';
            });
            player.on('pause', () => updateStatus(false));
            player.on('waiting', () => updateStatus(false, 'Buffering...'));
            player.on('error', (event) => {
                console.error('Player error:', event);
                let errorMsg = 'Stream error. Maaaring expired ang token o server issue.';
                const mediaError = player.error();
                if (mediaError) {
                    errorMsg = `HLS Error: ${mediaError.code} - ${mediaError.message || 'Network/Stream problem'}`;
                }
                updateStatus(false, errorMsg);
                document.getElementById('qualityInfo').innerHTML = '⚠️ Nagkaroon ng error';
                
                // Auto retry logic up to MAX_RETRIES
                if (retryAttempt < MAX_RETRIES) {
                    retryAttempt++;
                    console.log(`Retrying... attempt ${retryAttempt}`);
                    setTimeout(() => {
                        loadStream();
                    }, 3000);
                } else {
                    updateStatus(false, 'Hindi makakonekta. Pindutin ang reload.');
                }
            });
            player.on('loadedmetadata', () => {
                // Check for live streams or qualities
                try {
                    if (player.hls && player.hls.levels && player.hls.levels.length) {
                        currentQualityLevels = player.hls.levels;
                        const qualityCount = currentQualityLevels.length;
                        document.getElementById('qualityInfo').innerHTML = `🎛️ HLS • ${qualityCount} quality variants`;
                    } else {
                        document.getElementById('qualityInfo').innerHTML = '📡 Live Adaptive Stream';
                    }
                } catch(e) { console.warn(e); }
                updateStatus(true);
            });
        } else {
            // If player exists, just change source
            loadStream();
        }
    }

    function loadStream() {
        if (!player) return;
        updateStatus(false, 'Kumokonekta sa stream...');
        document.getElementById('qualityInfo').innerHTML = '⏳ Naglo-load ng manifest...';
        
        // Remove any existing source and set new one
        player.src({ type: 'application/x-mpegURL', src: M3U8_URL });
        player.load();
        // Autoplay attempt
        player.play().catch(e => {
            console.warn('Autoplay prevented:', e);
            updateStatus(false, 'I-tap ang play para magsimula');
        });
    }

    // Reload function (manual)
    function reloadStream() {
        retryAttempt = 0;
        if (player) {
            loadStream();
        } else {
            initHLSPlayer();
        }
    }

    // Detect if token is expired? Not directly, but show helpful note.
    function checkTokenExpiryWarn() {
        // The token in URL has exp claim (we can decode to show warning, but just a friendly UX)
        try {
            const urlParams = new URLSearchParams(window.location.search);
            // just optional: display a note but not required.
            console.log("Stream URL uses token authentication. If stream fails, token may have expired.");
        } catch(e) {}
        const footerNote = document.querySelector('.footer-note');
        if (footerNote) {
            footerNote.innerHTML += ` • 🔑 Token-based access | Nagre-renew? I-reload kung kinakailangan.`;
        }
    }

    // Add button listener
    document.getElementById('reloadBtn').addEventListener('click', () => {
        reloadStream();
    });

    // Start everything when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
        initHLSPlayer();
        checkTokenExpiryWarn();
        
        // Optional: Network detection indicator
        window.addEventListener('online', () => {
            console.log('Back online, attempting to refresh stream');
            reloadStream();
        });
    });
</script>
</body>
</html>
